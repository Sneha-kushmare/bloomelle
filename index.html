<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomelle</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: #fff5f5;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #ffb6c1;
            padding: 40px;
            color: white;
            font-size: 24px;
            letter-spacing: 2px;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { color: #ff6b81; }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        input, textarea {
            padding: 12px;
            border: 1px solid #ffd1d7;
            border-radius: 8px;
            outline: none;
        }
        button {
            background-color: #ff6b81;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #ff4757; }
    </style>
</head>
<body>

    <header>
        <h1>BLOOMELLE</h1>
    </header>

    <div class="container">
        <h2>Welcome to Bloomelle</h2>
        <p>We are creating something beautiful here. Stay tuned!</p>
        
        <hr style="border: 0; border-top: 1px solid #ffe3e7; margin: 20px 0;">

        <h3>Contact Us</h3>
        <form action="https://formspree.io/f/sample" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" rows="4" placeholder="Type your message here..." required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

</body>
</html>
